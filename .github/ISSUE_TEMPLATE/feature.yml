name: Feature Request
description: Suggest an idea or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief description of the feature.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define how the feature will be validated.
      placeholder: |
        - [ ] Criteria 1
        - [ ] Criteria 2
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, ESP-IDF version, hardware, etc.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information.
